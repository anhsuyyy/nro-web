<!-- client/game.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NRO Web - Giai Đoạn 4: Combat & Quái Vật</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #f5b041; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<script>
    // ==========================================
    // 🧠 1. KHỞI TẠO CẤU HÌNH PHASER (ĐOẠN CÒN THIẾU)
    // ==========================================
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 0 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    // Khai báo các biến toàn cục dùng chung cho Game
    let ws;
    let myId = null;
    let player; 
    let cursors;
    let otherPlayers = {}; // <-- Phải khởi tạo object này để quản lý người chơi khác
    let mobSprite;
    let mobHpText;
    let spaceKey;
    let nextAttackTime = 0; 

    // ==========================================
    // 🎨 2. CÁC HÀM XỬ LÝ LOGIC GAME
    // ==========================================
    function preload() {
        // Load ảnh thật từ thư mục assets của bạn
        this.load.spritesheet('hero_head', 'assets/hero_head.png', { frameWidth: 32, frameHeight: 32 });
        this.load.spritesheet('hero_body', 'assets/hero_body.png', { frameWidth: 32, frameHeight: 48 });

        // Tự vẽ ảnh Mộc nhân màu nâu trực tiếp bằng Canvas
        let canvasMob = document.createElement('canvas');
        canvasMob.width = 40; canvasMob.height = 60;
        let ctxM = canvasMob.getContext('2d');
        ctxM.fillStyle = '#875a36'; ctxM.fillRect(0, 0, 40, 60); 
        this.textures.addCanvas('texture_mob', canvasMob);
    }

    function create() {
        const scene = this;
        cursors = scene.input.keyboard.createCursorKeys();
        spaceKey = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE); 

        // Vẽ nền ô lưới nền tối
        scene.add.grid(400, 225, 800, 450, 40, 40, 0x222222, 1, 0x333333, 1);

        // Kết nối WebSocket đến Server của bạn
        ws = new WebSocket('ws://localhost:8080');

        ws.onmessage = (event) => {
            const packet = JSON.parse(event.data);

            if (packet.type === 'INIT_CONNECTED') {
                myId = packet.data.id;
                let partHead = scene.add.sprite(0, -20, 'hero_head', 0);
                let partBody = scene.add.sprite(0, 0, 'hero_body', 0);
                player = scene.add.container(Math.random() * 200 + 100, Math.random() * 200 + 100, [partBody, partHead]);
                scene.physics.world.enable(player);
                player.body.setCollideWorldBounds(true);
                player.partBody = partBody; player.partHead = partHead;

                let nameText = scene.add.text(0, -45, myId, { fontSize: '12px', fill: '#ffff00' }).setOrigin(0.5);
                player.add(nameText);
            }

            if (packet.type === 'SYNC_GAME') {
                const playersData = packet.data.players;
                const mobData = packet.data.mob;

                // --- ĐỒNG BỘ QUÁI VẬT ---
                if (!mobSprite && !mobData.isDead) {
                    mobSprite = scene.add.sprite(mobData.x, mobData.y, 'texture_mob');
                    mobHpText = scene.add.text(mobData.x, mobData.y - 45, `${mobData.hp}/${mobData.maxHp}`, { fontSize: '12px', fill: '#ff6666' }).setOrigin(0.5);
                } else if (mobSprite) {
                    if (mobData.isDead) {
                        mobSprite.destroy(); mobSprite = null;
                        mobHpText.destroy(); mobHpText = null;
                    } else {
                        mobHpText.setText(`${mobData.hp}/${mobData.maxHp}`);
                    }
                }

                // --- ĐỒNG BỘ NGƯỜI CHƠI KHÁC ---
              // --- ĐỒNG BỘ NGƯỜI CHƠI KHÁC (Bản cập nhật giảm giật) ---
for (let id in playersData) {
    if (id === myId) continue;
    if (!otherPlayers[id]) {
        let oHead = scene.add.sprite(0, -20, 'hero_head', 0);
        let oBody = scene.add.sprite(0, 0, 'hero_body', 0);
        let oText = scene.add.text(0, -45, id, { fontSize: '12px', fill: '#ff0000' }).setOrigin(0.5);
        let container = scene.add.container(playersData[id].x, playersData[id].y, [oBody, oHead, oText]);
        
        scene.physics.world.enable(container);
        otherPlayers[id] = container;
    } else {
        // Thay vì gán cứng: otherPlayers[id].x = playersData[id].x;
        // Chúng ta dùng hàm di chuyển vật lý hướng tới mục tiêu (di chuyển mượt hơn)
        scene.physics.moveTo(otherPlayers[id], playersData[id].x, playersData[id].y, 150, 50); // 150 là tốc độ, 50ms là thời gian tối đa
        
        // Sửa hướng quay mặt của người chơi khác
        if (playersData[id].x < otherPlayers[id].x) {
            otherPlayers[id].list[0].setFlipX(true); // lật body
            otherPlayers[id].list[1].setFlipX(true); // lật head
        } else if (playersData[id].x > otherPlayers[id].x) {
            otherPlayers[id].list[0].setFlipX(false);
            otherPlayers[id].list[1].setFlipX(false);
        }
    }
}
                // Xóa bớt người chơi offline để tránh rác RAM
                for (let id in otherPlayers) {
                    if (!playersData[id]) {
                        otherPlayers[id].destroy();
                        delete otherPlayers[id];
                    }
                }
            }

            // --- HIỆU ỨNG SỐ DAMAGE BAY LÊN ---
            if (packet.type === 'MOB_DAMAGED') {
                let dmgText = scene.add.text(400, 180, `-${packet.data.damage}`, { fontSize: '18px', fill: '#ff0000', fontWeight: 'bold' }).setOrigin(0.5);
                scene.tweens.add({
                    targets: dmgText,
                    y: 130,
                    alpha: 0,
                    duration: 800,
                    onComplete: () => { dmgText.destroy(); }
                });
            }
        };
    }

    function update() {
        if (!player || !ws || ws.readyState !== 1) return;

        let moved = false;
        player.body.setVelocity(0);

        if (cursors.left.isDown) { player.body.setVelocityX(-150); moved = true; player.partBody.setFlipX(true); player.partHead.setFlipX(true); }
        else if (cursors.right.isDown) { player.body.setVelocityX(150); moved = true; player.partBody.setFlipX(false); player.partHead.setFlipX(false); }
        if (cursors.up.isDown) { player.body.setVelocityY(-150); moved = true; }
        else if (cursors.down.isDown) { player.body.setVelocityY(150); moved = true; }

        if (moved) {
            ws.send(JSON.stringify({ type: 'PLAYER_MOVE', data: { x: player.x, y: player.y, isMoving: moved } }));
        }

        // --- BẤM CÁCH ĐỂ ĐẤM QUÁI ---
        let timeNow = this.time.now;
        if (Phaser.Input.Keyboard.JustDown(spaceKey) && timeNow > nextAttackTime) {
            nextAttackTime = timeNow + 300; 

            ws.send(JSON.stringify({
                type: 'PLAYER_ATTACK',
                data: { targetId: 'mob_moc_nhan' }
            }));
        }
    }
</script>
</body>
</html>
