<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ngọc Rồng Online Web - Đăng Nhập</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2c3e50; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: #e67e22; border: none; border-radius: 5px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 5px;}
        button:hover { background: #d35400; }
        .toggle-link { color: #3498db; cursor: pointer; font-size: 13px; margin-top: 10px; display: block; }
        .planet-select { display: none; }
        .planet-card { background: #34495e; padding: 15px; margin: 10px 0; border-radius: 5px; cursor: pointer; border: 2px solid transparent; }
        .planet-card:hover { border-color: #f1c40f; }
    </style>
</head>
<body>

    <div class="box" id="authBox">
        <h2 id="authTitle">ĐĂNG NHẬP NRO</h2>
        <input type="text" id="inpUser" placeholder="Tài khoản...">
        <input type="password" id="inpPass" placeholder="Mật khẩu...">
        <button id="btnSubmit" onclick="submitAuth()">VÀO GAME</button>
        <span class="toggle-link" id="toggleLink" onclick="toggleMode()">Chưa có tài khoản? Đăng ký ngay</span>
    </div>

    <div class="box planet-select" id="planetBox">
        <h2>CHỌN HÀNH TINH</h2>
        <p style="font-size: 12px; color: #bdc3c7;">Tài khoản mới, vui lòng chọn bộ tộc:</p>
        <div class="planet-card" onclick="selectPlanet('TRAI_DAT')">🌍 Trái Đất (Kamejoko / Cân bằng)</div>
        <div class="planet-card" onclick="selectPlanet('NAMEC')">🟢 Namếc (Trị thương / Hỗ trợ)</div>
        <div class="planet-card" onclick="selectPlanet('XAYDA')">🐒 Xayda (Biến khỉ / Sát thương Chí mạng)</div>
    </div>

    <script>
        let ws = new WebSocket('ws://localhost:8080');
        let isRegisterMode = false;
        let internalUser = "";

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? "ĐĂNG KÝ TÀI KHOẢN" : "ĐĂNG NHẬP NRO";
            document.getElementById('toggleLink').innerText = isRegisterMode ? "Đã có tài khoản? Đăng nhập" : "Chưa có tài khoản? Đăng ký ngay";
        }

        function submitAuth() {
            const user = document.getElementById('inpUser').value.trim();
            const pass = document.getElementById('inpPass').value.trim();
            if(!user || !pass) return alert("Vui lòng điền đủ thông tin!");
            
            internalUser = user;
            ws.send(JSON.stringify({
                type: 'AUTH',
                data: { user: user, pass: pass, isRegister: isRegisterMode }
            }));
        }

        function selectPlanet(planetName) {
            ws.send(JSON.stringify({
                type: 'CHOOSE_PLANET',
                data: { user: internalUser, planet: planetName }
            }));
        }

        ws.onmessage = (event) => {
            const packet = JSON.parse(event.data);

            if (packet.type === 'AUTH_FAIL') {
                alert(packet.data.msg);
            }
            if (packet.type === 'NEED_CHOOSE_PLANET') {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('planetBox').style.display = 'block';
            }
            if (packet.type === 'INIT_CONNECTED') {
                // Đăng nhập/Chọn hành tinh thành công hoàn toàn, lưu thông tin vào sessionStorage rồi chuyển sang màn chơi game!
                sessionStorage.setItem('nro_username', packet.data.id);
                window.location.href = 'game.html';
            }
        };
    </script>
</body>
</html>
