<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ngọc Rồng Web - Bản Thử Nghiệm Kết Nối</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; padding: 20px; }
        #chat-box { width: 100%; height: 300px; background: #000; border: 1px solid #55px; overflow-y: scroll; padding: 10px; box-sizing: border-box; }
        #input-panel { margin-top: 10px; }
        input { padding: 10px; width: 70%; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>

    <h2>🐉 NRO WEB - GIAI ĐOẠN 1: KẾT NỐI REAL-TIME</h2>
    <div id="status">Trạng thái: Đang kết nối...</div>
    <p>ID của bạn: <span id="my-id" style="color: yellow; font-weight: bold;">Chưa có</span></p>

    <div id="chat-box"></div>

    <div id="input-panel">
        <input type="text" id="chat-msg" placeholder="Nhập tin nhắn chat thế giới..." disabled>
        <button id="send-btn" disabled>Gửi</button>
    </div>

    <script>
        // Kết nối tới Game Server thông qua giao thức ws://
        const ws = new WebSocket('ws://localhost:8080');
        
        const statusDiv = document.getElementById('status');
        const myIdSpan = document.getElementById('my-id');
        const chatBox = document.getElementById('chat-box');
        const chatMsg = document.getElementById('chat-msg');
        const sendBtn = document.getElementById('send-btn');

        // Khi kết nối thành công
        ws.onopen = () => {
            statusDiv.innerHTML = "Trạng thái:🟢 Đã kết nối Server thành công!";
            chatMsg.disabled = false;
            sendBtn.disabled = false;
        };

        // Khi nhận được dữ liệu từ Server gửi về
        ws.onmessage = (event) => {
            const packet = JSON.parse(event.data);
            
            if (packet.type === 'INIT_CONNECTED') {
                myIdSpan.innerText = packet.data.id;
            }

            if (packet.type === 'PLAYER_CHAT') {
                chatBox.innerHTML += `<p><b>[${packet.data.id}]:</b> ${packet.data.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight; // Tự cuộn xuống dưới
            }
        };

        // Khi mất kết nối
        ws.onclose = () => {
            statusDiv.innerHTML = "Trạng thái:🔴 Mất kết nối Server!";
            chatMsg.disabled = true;
            sendBtn.disabled = true;
        };

        // Logic gửi tin nhắn lên server
        function sendMessage() {
            const text = chatMsg.value.trim();
            if(text === "") return;

            // Đóng gói dữ liệu dạng JSON gửi lên Server
            ws.send(JSON.stringify({
                type: 'CHAT',
                data: { message: text }
            }));

            chatMsg.value = "";
        }

        sendBtn.addEventListener('click', sendMessage);
        chatMsg.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
